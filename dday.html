<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-DAY 계산기 | 날짜 차이·디데이 계산</title>
<meta name="description" content="두 날짜 사이의 D-day를 계산하고, 날짜 간 차이(년·월·일)를 확인하세요.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V3FZTLEP4M"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-V3FZTLEP4M');
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f1117; --card: #1a1d27; --border: #2e3347; --accent: #e879f9; --text: #f0f2ff; --muted: #8892aa; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 30px 16px 60px; }
  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; text-decoration: none; margin-bottom: 24px; transition: color 0.2s; }
  .back:hover { color: var(--accent); }
  .wrap { max-width: 480px; margin: 0 auto; }
  h1 { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
  h1 span { color: var(--accent); }
  .sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .tab-wrap { display: flex; border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .tab-btn { flex: 1; padding: 11px 0; font-size: 13px; font-weight: 700; border: none; background: var(--card); color: var(--muted); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; }
  .tab-btn.active { background: var(--accent); color: #fff; }
  .tab-btn:not(:last-child) { border-right: 1.5px solid var(--border); }
  .panel { display: none; }
  .panel.active { display: block; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin-bottom: 14px; }
  label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
  input[type=date], input[type=text] { width: 100%; background: #0f1117; border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 16px; padding: 11px 14px; font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color 0.2s; }
  input[type=date]:focus, input[type=text]:focus { border-color: var(--accent); }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); }

  .result-main { background: linear-gradient(135deg, #2a0a2a, #1a1d27); border: 1px solid rgba(232,121,249,0.3); border-radius: 18px; padding: 30px 24px; margin-bottom: 14px; text-align: center; }
  .dday-num { font-size: 64px; font-weight: 900; color: var(--accent); letter-spacing: -2px; line-height: 1; }
  .dday-label { font-size: 14px; color: var(--muted); margin-top: 6px; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .info-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; text-align: center; }
  .info-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .info-val { font-size: 18px; font-weight: 700; color: var(--text); }

  .quick-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px 22px; margin-bottom: 14px; }
  .quick-wrap h3 { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 12px; }
  .quick-btn-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .quick-btn { font-size: 12px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 99px; background: #0f1117; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

  .notice { font-size: 11px; color: var(--muted); line-height: 1.7; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← 계산기 목록으로</a>
  <h1>📅 <span>D-DAY</span> 계산기</h1>
  <p class="sub">날짜 차이, D-day, 기념일까지 계산합니다</p>

  <div class="tab-wrap">
    <button class="tab-btn active" onclick="switchTab('dday')">D-DAY</button>
    <button class="tab-btn" onclick="switchTab('diff')">날짜 차이</button>
    <button class="tab-btn" onclick="switchTab('add')">날짜 더하기</button>
  </div>

  <!-- D-DAY -->
  <div class="panel active" id="panel-dday">
    <div class="card">
      <label>목표 날짜</label>
      <input type="date" id="target-date" oninput="calcDday()">
    </div>
    <div class="result-main" id="dday-result">
      <div class="dday-num" id="dday-num">—</div>
      <div class="dday-label" id="dday-label">날짜를 선택하세요</div>
    </div>
    <div class="quick-wrap">
      <h3>빠른 선택</h3>
      <div class="quick-btn-wrap">
        <button class="quick-btn" onclick="setQuick(100)">100일 후</button>
        <button class="quick-btn" onclick="setQuick(365)">1년 후</button>
        <button class="quick-btn" onclick="setNewYear()">새해 첫날</button>
        <button class="quick-btn" onclick="setChristmas()">크리스마스</button>
      </div>
    </div>
  </div>

  <!-- 날짜 차이 -->
  <div class="panel" id="panel-diff">
    <div class="card">
      <label>시작 날짜</label>
      <input type="date" id="start-date" oninput="calcDiff()">
    </div>
    <div class="card">
      <label>종료 날짜</label>
      <input type="date" id="end-date" oninput="calcDiff()">
    </div>
    <div class="result-main">
      <div class="dday-num" id="diff-days">—</div>
      <div class="dday-label" id="diff-label">두 날짜를 선택하세요</div>
    </div>
    <div class="info-grid" id="diff-grid" style="display:none">
      <div class="info-box"><div class="info-label">년</div><div class="info-val" id="diff-y">—</div></div>
      <div class="info-box"><div class="info-label">개월</div><div class="info-val" id="diff-m">—</div></div>
      <div class="info-box"><div class="info-label">일</div><div class="info-val" id="diff-d">—</div></div>
    </div>
  </div>

  <!-- 날짜 더하기 -->
  <div class="panel" id="panel-add">
    <div class="card">
      <label>기준 날짜</label>
      <input type="date" id="base-date" oninput="calcAdd()">
    </div>
    <div class="card">
      <label>더할 일수</label>
      <input type="text" id="add-days" placeholder="예: 100" oninput="calcAdd()">
    </div>
    <div class="result-main">
      <div class="dday-num" style="font-size:36px" id="add-result">—</div>
      <div class="dday-label" id="add-label">날짜와 일수를 입력하세요</div>
    </div>
  </div>

  <p class="notice">※ 오늘 날짜 기준으로 계산됩니다.</p>
</div>
<script>
const today = new Date();
today.setHours(0,0,0,0);

function switchTab(t) {
  ['dday','diff','add'].forEach((id,i) => {
    document.querySelectorAll('.tab-btn')[i].classList.toggle('active', id===t);
    document.getElementById('panel-'+id).classList.toggle('active', id===t);
  });
}

function fmtDate(d) {
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${['일','월','화','수','목','금','토'][d.getDay()]}요일)`;
}

function calcDday() {
  const val = document.getElementById('target-date').value;
  if (!val) return;
  const target = new Date(val);
  target.setHours(0,0,0,0);
  const diff = Math.round((target - today) / (1000*60*60*24));
  const numEl = document.getElementById('dday-num');
  if (diff === 0) {
    numEl.textContent = 'D-DAY';
    document.getElementById('dday-label').textContent = '오늘이 바로 그 날입니다! 🎉';
  } else if (diff > 0) {
    numEl.textContent = 'D-' + diff;
    document.getElementById('dday-label').textContent = fmtDate(target) + '까지 ' + diff + '일 남았습니다';
  } else {
    numEl.textContent = 'D+' + Math.abs(diff);
    document.getElementById('dday-label').textContent = fmtDate(target) + '로부터 ' + Math.abs(diff) + '일이 지났습니다';
  }
}

function setQuick(days) {
  const d = new Date(today);
  d.setDate(d.getDate() + days);
  document.getElementById('target-date').value = d.toISOString().split('T')[0];
  calcDday();
}
function setNewYear() {
  const ny = new Date(today.getFullYear()+1, 0, 1);
  document.getElementById('target-date').value = ny.toISOString().split('T')[0];
  calcDday();
}
function setChristmas() {
  let xmas = new Date(today.getFullYear(), 11, 25);
  if (xmas < today) xmas = new Date(today.getFullYear()+1, 11, 25);
  document.getElementById('target-date').value = xmas.toISOString().split('T')[0];
  calcDday();
}

function calcDiff() {
  const s = document.getElementById('start-date').value;
  const e = document.getElementById('end-date').value;
  if (!s || !e) return;
  const start = new Date(s); const end = new Date(e);
  const diffDays = Math.round(Math.abs(end - start) / (1000*60*60*24));
  document.getElementById('diff-days').textContent = diffDays + '일';
  document.getElementById('diff-label').textContent = (end >= start ? '차이: ' : '역순: ') + diffDays + '일';
  document.getElementById('diff-grid').style.display = 'grid';
  const y = Math.floor(diffDays / 365);
  const m = Math.floor((diffDays % 365) / 30);
  const d = diffDays % 30;
  document.getElementById('diff-y').textContent = y;
  document.getElementById('diff-m').textContent = m;
  document.getElementById('diff-d').textContent = d;
}

function calcAdd() {
  const base = document.getElementById('base-date').value;
  const days = parseInt(document.getElementById('add-days').value) || 0;
  if (!base || !days) return;
  const result = new Date(base);
  result.setDate(result.getDate() + days);
  document.getElementById('add-result').textContent = `${result.getFullYear()}.${String(result.getMonth()+1).padStart(2,'0')}.${String(result.getDate()).padStart(2,'0')}`;
  document.getElementById('add-label').textContent = fmtDate(result);
}

// 오늘 날짜 기본값
const todayStr = today.toISOString().split('T')[0];
document.getElementById('base-date').value = todayStr;
document.getElementById('start-date').value = todayStr;
</script>
</body>
</html>
