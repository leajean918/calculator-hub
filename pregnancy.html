<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>임신 주수 계산기 | 출산 예정일 임신 주수 계산</title>
<meta name="description" content="마지막 생리일을 입력하면 현재 임신 주수와 출산 예정일을 계산합니다.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V3FZTLEP4M"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-V3FZTLEP4M');
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f1117; --card: #1a1d27; --border: #2e3347; --accent: #f472b6; --text: #f0f2ff; --muted: #8892aa; --green: #34d399; --amber: #fbbf24; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 30px 16px 60px; }
  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; text-decoration: none; margin-bottom: 24px; }
  .back:hover { color: var(--accent); }
  .wrap { max-width: 480px; margin: 0 auto; }
  h1 { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
  h1 span { color: var(--accent); }
  .sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin-bottom: 14px; }
  label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
  input[type=date] { width: 100%; background: #0f1117; border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 18px; font-weight: 500; padding: 12px 16px; font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color 0.2s; }
  input[type=date]:focus { border-color: var(--accent); }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); }

  .result-main { background: linear-gradient(135deg, #2a0a1a, #1a1d27); border: 1px solid rgba(244,114,182,0.3); border-radius: 18px; padding: 28px 24px; margin-bottom: 14px; text-align: center; }
  .week-num { font-size: 72px; font-weight: 900; color: var(--accent); line-height: 1; letter-spacing: -2px; }
  .week-label { font-size: 16px; color: var(--muted); margin-top: 4px; margin-bottom: 20px; }
  .dday-badge { font-size: 14px; font-weight: 700; color: var(--accent); background: rgba(244,114,182,0.12); border-radius: 10px; padding: 8px 16px; display: inline-block; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .info-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; text-align: center; }
  .ib-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .ib-val { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.3; }

  .trimester { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px 22px; margin-bottom: 14px; }
  .trimester h3 { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 14px; }
  .tri-bar-wrap { margin-bottom: 8px; }
  .tri-bar-bg { height: 12px; border-radius: 99px; background: var(--border); overflow: hidden; margin: 6px 0; position: relative; }
  .tri-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), #fbbf24); transition: width 0.5s; }
  .tri-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }

  .milestone { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px 22px; margin-bottom: 14px; }
  .milestone h3 { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 12px; }
  .ms-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .ms-row:last-child { border-bottom: none; }
  .ms-row .lbl { color: var(--muted); }
  .ms-row .val { font-weight: 700; }
  .ms-row .done { color: var(--green); }
  .ms-row .upcoming { color: var(--amber); }

  .notice { font-size: 11px; color: var(--muted); line-height: 1.7; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← 계산기 목록으로</a>
  <h1>🤰 <span>임신 주수</span> 계산기</h1>
  <p class="sub">마지막 생리 시작일을 입력하면 현재 임신 주수와<br>출산 예정일을 알려드립니다</p>

  <div class="card">
    <label>마지막 생리 시작일 (LMP)</label>
    <input type="date" id="lmp" oninput="calc()">
  </div>

  <div id="result-wrap" style="display:none">
    <div class="result-main">
      <div class="week-num" id="week-num">—</div>
      <div class="week-label" id="week-label">임신 주차</div>
      <div class="dday-badge" id="dday-badge"></div>
    </div>

    <div class="info-grid">
      <div class="info-box">
        <div class="ib-label">출산 예정일 (EDD)</div>
        <div class="ib-val" id="edd">—</div>
      </div>
      <div class="info-box">
        <div class="ib-label">남은 기간</div>
        <div class="ib-val" id="remaining">—</div>
      </div>
      <div class="info-box">
        <div class="ib-label">임신 단계</div>
        <div class="ib-val" id="trimester-name">—</div>
      </div>
      <div class="info-box">
        <div class="ib-label">현재 개월 수</div>
        <div class="ib-val" id="months">—</div>
      </div>
    </div>

    <div class="trimester">
      <h3>임신 진행률</h3>
      <div class="tri-bar-wrap">
        <div class="tri-bar-bg"><div class="tri-bar-fill" id="progress-bar" style="width:0%"></div></div>
        <div class="tri-labels"><span>임신 시작</span><span id="pct-label">0%</span><span>출산 (40주)</span></div>
      </div>
    </div>

    <div class="milestone">
      <h3>주요 일정</h3>
      <div class="ms-row"><span class="lbl">1분기 끝 (13주)</span><span class="val" id="m1">—</span></div>
      <div class="ms-row"><span class="lbl">2분기 끝 (27주)</span><span class="val" id="m2">—</span></div>
      <div class="ms-row"><span class="lbl">만삭 (37주)</span><span class="val" id="m3">—</span></div>
      <div class="ms-row"><span class="lbl">출산 예정일 (40주)</span><span class="val" id="m4">—</span></div>
    </div>
  </div>

  <p class="notice">※ 마지막 생리일 기준 Naegele 공식으로 계산합니다.<br>정확한 주수는 산부인과 초음파 검사로 확인하세요.</p>
</div>
<script>
function fmtDate(d) {
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(d, days) {
  const r = new Date(d);
  r.setDate(r.getDate() + days);
  return r;
}
function calc() {
  const val = document.getElementById('lmp').value;
  if (!val) return;
  const lmp = new Date(val);
  const today = new Date();
  today.setHours(0,0,0,0);

  const edd = addDays(lmp, 280); // 40주
  const daysPreg = Math.round((today - lmp) / (1000*60*60*24));
  const daysLeft = Math.round((edd - today) / (1000*60*60*24));

  if (daysPreg < 0 || daysPreg > 300) return;

  const totalWeeks = Math.floor(daysPreg / 7);
  const extraDays = daysPreg % 7;
  const months = Math.floor(daysPreg / 30);
  const pct = Math.min(Math.round((daysPreg / 280) * 100), 100);

  let trimester;
  if (totalWeeks < 13) trimester = '1분기 (초기)';
  else if (totalWeeks < 27) trimester = '2분기 (중기)';
  else trimester = '3분기 (말기)';

  document.getElementById('result-wrap').style.display = 'block';
  document.getElementById('week-num').textContent = totalWeeks;
  document.getElementById('week-label').textContent = `주 ${extraDays}일 (임신 ${totalWeeks+1}주차)`;
  document.getElementById('dday-badge').textContent = daysLeft > 0 ? `출산까지 D-${daysLeft}` : '출산 예정일이 지났습니다';
  document.getElementById('edd').textContent = fmtDate(edd);
  document.getElementById('remaining').textContent = daysLeft > 0 ? `${Math.floor(daysLeft/7)}주 ${daysLeft%7}일` : '—';
  document.getElementById('trimester-name').textContent = trimester;
  document.getElementById('months').textContent = `약 ${months}개월`;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('pct-label').textContent = pct + '%';
  document.getElementById('m1').textContent = fmtDate(addDays(lmp, 91));
  document.getElementById('m2').textContent = fmtDate(addDays(lmp, 189));
  document.getElementById('m3').textContent = fmtDate(addDays(lmp, 259));
  document.getElementById('m4').textContent = fmtDate(edd);
}
</script>
</body>
</html>
