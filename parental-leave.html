<!DOCTYPE html>
<html lang="ko">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V3FZTLEP4M"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-V3FZTLEP4M');</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6685782149988736" crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>육아휴직 급여 계산기 | Calculator Hub</title>
<meta name="description" content="육아휴직 기간별 급여 예상액을 계산하세요.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--accent:#e879f9}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2e42;--text:#f0f2ff;--muted:#7a84a0;--dim:#4a5068}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.site-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.site-header a{text-decoration:none;color:var(--muted);font-size:13px}
.site-header a:hover{color:var(--text)}
.main{max-width:560px;margin:0 auto;padding:28px 20px 60px}
h1{font-size:clamp(20px,4vw,28px);font-weight:900;margin-bottom:8px}
.desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500}
.field input,.field select{width:100%;padding:12px 14px;background:#12151f;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:#1a1d27}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.calc-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:opacity .2s}
.calc-btn:hover{opacity:.88}
.result-box{background:#12151f;border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px;display:none}
.result-box.show{display:block}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
.result-row:last-child{border:none}
.result-row .label{color:var(--muted)}
.result-row .value{font-weight:700;font-size:15px;color:var(--accent)}
.result-main{text-align:center;padding:16px 0 12px;margin-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08)}
.result-main .big{font-size:32px;font-weight:900;color:var(--accent)}
.result-main .sub{font-size:12px;color:var(--muted);margin-top:4px}
.note{font-size:11px;color:var(--dim);line-height:1.6;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)}
.tab-wrap{display:flex;gap:6px;margin-bottom:16px}
.tab-btn{flex:1;padding:9px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.site-footer{text-align:center;padding:20px;font-size:12px;color:var(--dim);border-top:1px solid var(--border)}
.site-footer a{color:var(--dim);text-decoration:none}
</style>
</head>
<body>
<header class="site-header">
  <a href="/calculator-hub/">✦ Calculator Hub</a>
  <span style="color:var(--dim)">›</span>
  <span style="font-size:13px;color:var(--text)">육아휴직 급여 계산기</span>
</header>
<main class="main">
<h1>👶 육아휴직 급여 계산기</h1>
<p class="desc">2024년 기준 육아휴직 급여를 기간별로 계산합니다. (6+6 부모육아휴직 특례 포함)</p>
<div class="card">
  <div class="field"><label>통상임금 (월급여, 원)</label><input id="salary" type="number" placeholder="3000000" oninput="calc()"></div>
  <div class="row2">
    <div class="field"><label>육아휴직 시작 시점</label>
      <select id="order" onchange="calc()">
        <option value="first">첫 번째 (엄마 또는 아빠 중 먼저)</option>
        <option value="second">두 번째 (6+6 특례 적용)</option>
      </select>
    </div>
    <div class="field"><label>육아휴직 기간 (개월)</label>
      <select id="months" onchange="calc()">
        <option value="3">3개월</option>
        <option value="6">6개월</option>
        <option value="12" selected>12개월</option>
      </select>
    </div>
  </div>
</div>
<div class="result-box" id="result">
  <div class="result-main"><div class="big" id="r-main">0원</div><div class="sub">육아휴직 총 수령 예상액</div></div>
  <div id="r-detail"></div>
  <p class="note">※ 2024년 기준 | 통상임금 80% (상한 150만원, 하한 70만원) | 6+6 특례: 양쪽 부모 모두 육아휴직 시 첫 6개월 100% 지급 (상한 200만~300만원) | 실제 지급액은 고용센터 확인 필요</p>
</div>
</main>
<footer class="site-footer">
  본 계산기는 간편 계산용으로 실제 금액과 차이가 있을 수 있습니다.<br>
  <a href="/calculator-hub/privacy.html">개인정보처리방침</a>
</footer>
<script>

function fmt(n){if(n>=10000)return Math.round(n/10000)+'만원';return Math.round(n).toLocaleString()+'원';}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function calc(){
  const salary=parseFloat(document.getElementById('salary').value)||0;
  const order=document.getElementById('order').value;
  const totalMonths=parseFloat(document.getElementById('months').value);
  const rows=[];let total=0;
  if(order==='second'){
    // 6+6 특례: 1-3개월 100% 상한300, 4-6개월 100% 상한200, 이후 80% 상한150
    for(let m=1;m<=totalMonths;m++){
      let pay,rate,cap;
      if(m<=3){rate=1.0;cap=3000000;}
      else if(m<=6){rate=1.0;cap=2000000;}
      else{rate=0.8;cap=1500000;}
      pay=clamp(Math.round(salary*rate),700000,cap);
      rows.push({label:m+'개월차',rate:(rate*100)+'%',cap:fmt(cap),pay});
      total+=pay;
    }
  } else {
    // 일반: 1-6개월 80% 상한150, 7-12개월 80% 상한150 (2024년 단순화)
    for(let m=1;m<=totalMonths;m++){
      let pay;
      pay=clamp(Math.round(salary*0.8),700000,1500000);
      rows.push({label:m+'개월차',rate:'80%',cap:'150만원',pay});
      total+=pay;
    }
  }
  // 대표 행만 표시 (1-3, 4-6, 7-12)
  let detail='';
  const groups=order==='second'?
    [{s:1,e:Math.min(3,totalMonths)},{s:4,e:Math.min(6,totalMonths)},{s:7,e:totalMonths}]:
    [{s:1,e:totalMonths}];
  groups.filter(g=>g.s<=g.e&&g.s<=totalMonths).forEach(g=>{
    const r=rows[g.s-1];
    detail+=`<div class="result-row"><span class="label">${g.s}~${g.e}개월 (${r.rate}, 상한 ${r.cap})</span><span class="value">${fmt(r.pay)}/월</span></div>`;
  });
  detail+=`<div class="result-row"><span class="label">총 수령 예상액</span><span class="value">${fmt(total)}</span></div>`;
  document.getElementById('r-detail').innerHTML=detail;
  document.getElementById('r-main').textContent=fmt(total);
  document.getElementById('result').classList.add('show');
}

</script>
</body>
</html>
