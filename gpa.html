<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학점 계산기 | GPA 평점 학점 계산</title>
<meta name="description" content="과목별 학점과 성적을 입력하면 평균 학점(GPA)을 계산합니다. 4.5, 4.3, 4.0 만점 모두 지원.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V3FZTLEP4M"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-V3FZTLEP4M');
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f1117; --card: #1a1d27; --border: #2e3347; --accent: #34d399; --text: #f0f2ff; --muted: #8892aa; --red: #f87171; --amber: #fbbf24; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 30px 16px 60px; }
  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; text-decoration: none; margin-bottom: 24px; }
  .back:hover { color: var(--accent); }
  .wrap { max-width: 540px; margin: 0 auto; }
  h1 { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
  h1 span { color: var(--accent); }
  .sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

  .scale-wrap { display: flex; gap: 8px; margin-bottom: 14px; }
  .scale-btn { flex: 1; padding: 10px 0; font-size: 13px; font-weight: 700; border: 1.5px solid var(--border); border-radius: 10px; background: var(--card); color: var(--muted); cursor: pointer; text-align: center; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; }
  .scale-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(52,211,153,0.1); }

  .subject-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 14px; }
  .subject-header { display: grid; grid-template-columns: 2fr 1fr 1.5fr 36px; gap: 8px; margin-bottom: 8px; font-size: 12px; color: var(--muted); font-weight: 700; padding: 0 2px; }
  .subject-row { display: grid; grid-template-columns: 2fr 1fr 1.5fr 36px; gap: 8px; margin-bottom: 8px; align-items: center; }
  .subject-row input, .subject-row select { background: #0f1117; border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; padding: 8px 10px; font-family: 'Noto Sans KR', sans-serif; outline: none; width: 100%; }
  .subject-row input:focus, .subject-row select:focus { border-color: var(--accent); }
  .del-btn { width: 36px; height: 36px; background: rgba(248,113,113,0.15); border: none; border-radius: 8px; color: var(--red); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .add-btn { width: 100%; padding: 10px; background: rgba(52,211,153,0.1); border: 1.5px dashed rgba(52,211,153,0.4); border-radius: 10px; color: var(--accent); font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 4px; font-family: 'Noto Sans KR', sans-serif; }

  .result-main { background: linear-gradient(135deg, #0a2a1a, #1a1d27); border: 1px solid rgba(52,211,153,0.3); border-radius: 18px; padding: 28px 24px; margin-bottom: 14px; text-align: center; }
  .gpa-num { font-size: 72px; font-weight: 900; color: var(--accent); letter-spacing: -3px; line-height: 1; }
  .gpa-scale { font-size: 14px; color: var(--muted); margin-top: 4px; margin-bottom: 16px; }
  .gpa-grade { font-size: 18px; font-weight: 700; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; text-align: center; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--text); }
  .notice { font-size: 11px; color: var(--muted); line-height: 1.7; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← 계산기 목록으로</a>
  <h1>🎓 <span>학점</span> 계산기</h1>
  <p class="sub">과목별 학점과 성적을 입력하면 평균 학점(GPA)을 계산합니다</p>

  <div class="scale-wrap">
    <button class="scale-btn active" onclick="setScale(4.5)">4.5 만점</button>
    <button class="scale-btn" onclick="setScale(4.3)">4.3 만점</button>
    <button class="scale-btn" onclick="setScale(4.0)">4.0 만점</button>
  </div>

  <div class="subject-wrap">
    <div class="subject-header">
      <span>과목명</span><span>학점</span><span>성적</span><span></span>
    </div>
    <div id="subject-list"></div>
    <button class="add-btn" onclick="addRow()">+ 과목 추가</button>
  </div>

  <div class="result-main">
    <div class="gpa-num" id="gpa-num">0.00</div>
    <div class="gpa-scale" id="gpa-scale">/ 4.5 만점</div>
    <div class="gpa-grade" id="gpa-grade">과목을 입력하세요</div>
  </div>

  <div class="stat-grid">
    <div class="stat-box"><div class="stat-label">총 이수 학점</div><div class="stat-val" id="total-credits">0</div></div>
    <div class="stat-box"><div class="stat-label">과목 수</div><div class="stat-val" id="subject-count">0</div></div>
    <div class="stat-box"><div class="stat-label">취득 성적점수</div><div class="stat-val" id="grade-points">0.00</div></div>
  </div>

  <p class="notice">※ 학교마다 성적 기준이 다를 수 있습니다. 정확한 학점은 학교 포털을 확인하세요.</p>
</div>
<script>
let scale = 4.5;
const grades45 = {'A+':4.5,'A0':4.0,'A-':3.7,'B+':3.3,'B0':3.0,'B-':2.7,'C+':2.3,'C0':2.0,'C-':1.7,'D+':1.3,'D0':1.0,'D-':0.7,'F':0};
const grades43 = {'A+':4.3,'A0':4.0,'A-':3.7,'B+':3.3,'B0':3.0,'B-':2.7,'C+':2.3,'C0':2.0,'C-':1.7,'D+':1.3,'D0':1.0,'D-':0.7,'F':0};
const grades40 = {'A':4.0,'B':3.0,'C':2.0,'D':1.0,'F':0};

function getGrades() { return scale === 4.0 ? grades40 : scale === 4.3 ? grades43 : grades45; }

function setScale(s) {
  scale = s;
  document.querySelectorAll('.scale-btn').forEach((b,i) => b.classList.toggle('active', [4.5,4.3,4.0][i]===s));
  document.getElementById('gpa-scale').textContent = `/ ${s} 만점`;
  renderGradeOptions();
  calcGPA();
}

function renderGradeOptions() {
  const grades = getGrades();
  document.querySelectorAll('.grade-select').forEach(sel => {
    const cur = sel.value;
    sel.innerHTML = Object.entries(grades).map(([g,v]) => `<option value="${v}" ${cur==v?'selected':''}>${g} (${v})</option>`).join('');
  });
}

let rowId = 0;
function addRow(name='', credits=3, gradeVal=null) {
  const id = rowId++;
  const grades = getGrades();
  const defaultVal = gradeVal !== null ? gradeVal : Object.values(grades)[2];
  const options = Object.entries(grades).map(([g,v]) => `<option value="${v}" ${v==defaultVal?'selected':''}>${g} (${v})</option>`).join('');
  const div = document.createElement('div');
  div.className = 'subject-row';
  div.id = `row-${id}`;
  div.innerHTML = `
    <input type="text" placeholder="과목명" value="${name}" oninput="calcGPA()">
    <input type="number" min="1" max="6" step="0.5" value="${credits}" oninput="calcGPA()">
    <select class="grade-select" onchange="calcGPA()">${options}</select>
    <button class="del-btn" onclick="delRow(${id})">✕</button>`;
  document.getElementById('subject-list').appendChild(div);
  calcGPA();
}

function delRow(id) {
  const el = document.getElementById(`row-${id}`);
  if (el) el.remove();
  calcGPA();
}

function calcGPA() {
  const rows = document.querySelectorAll('.subject-row');
  let totalCredits = 0, totalPoints = 0, count = 0;
  rows.forEach(row => {
    const credits = parseFloat(row.querySelectorAll('input')[1].value)||0;
    const grade = parseFloat(row.querySelector('select').value)||0;
    if (credits > 0) { totalCredits += credits; totalPoints += credits * grade; count++; }
  });
  const gpa = totalCredits > 0 ? totalPoints / totalCredits : 0;
  document.getElementById('gpa-num').textContent = gpa.toFixed(2);
  document.getElementById('total-credits').textContent = totalCredits;
  document.getElementById('subject-count').textContent = count;
  document.getElementById('grade-points').textContent = gpa.toFixed(2);

  let grade, color;
  const pct = gpa / scale;
  if (pct >= 0.95) { grade = '🏆 최우수 (수석권)'; color = '#34d399'; }
  else if (pct >= 0.85) { grade = '✅ 우수'; color = '#38bdf8'; }
  else if (pct >= 0.75) { grade = '📊 양호'; color = '#fbbf24'; }
  else if (pct >= 0.60) { grade = '📌 보통'; color = '#fb923c'; }
  else { grade = '⚠️ 분발 필요'; color = '#f87171'; }

  const gradeEl = document.getElementById('gpa-grade');
  gradeEl.textContent = count > 0 ? grade : '과목을 입력하세요';
  gradeEl.style.color = count > 0 ? color : 'var(--muted)';
  document.getElementById('gpa-num').style.color = count > 0 ? color : 'var(--accent)';
}

// 기본 과목 5개 추가
const defaultSubjects = [
  ['전공필수', 3], ['전공선택', 3], ['교양', 2], ['영어', 2], ['전공실습', 3]
];
defaultSubjects.forEach(([name, credit]) => addRow(name, credit));
</script>
</body>
</html>
