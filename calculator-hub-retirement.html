<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퇴직금 계산기 | 입사일·퇴사일로 간편 계산</title>
<meta name="description" content="입사일과 퇴사일, 또는 월급여와 근속개월수로 예상 퇴직금을 간편하게 계산하세요.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f1117; --card: #1a1d27; --border: #2e3347; --accent: #a78bfa; --text: #f0f2ff; --muted: #8892aa; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 30px 16px 60px; }

  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; text-decoration: none; margin-bottom: 24px; transition: color 0.2s; }
  .back:hover { color: var(--accent); }
  .wrap { max-width: 500px; margin: 0 auto; }
  h1 { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
  h1 span { color: var(--accent); }
  .sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

  .tab-wrap { display: flex; border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .tab-btn { flex: 1; padding: 12px 0; font-size: 13px; font-weight: 700; border: none; background: var(--card); color: var(--muted); cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; line-height: 1.5; }
  .tab-btn.active { background: var(--accent); color: #fff; }
  .tab-btn:first-child { border-right: 1.5px solid var(--border); }

  .panel { display: none; }
  .panel.active { display: block; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin-bottom: 14px; }
  label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
  input { width: 100%; background: #0f1117; border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 16px; font-weight: 500; padding: 11px 14px; font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--accent); }
  .row2 { display: flex; gap: 12px; }
  .row2 .ig { flex: 1; }

  .result-box { background: linear-gradient(135deg, #2a1a4a, #1a1d27); border: 1px solid rgba(167,139,250,0.3); border-radius: 18px; padding: 26px 24px; text-align: center; margin-bottom: 14px; }
  .result-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .result-amount { font-size: 38px; font-weight: 900; color: var(--accent); letter-spacing: -1px; }
  .result-detail { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.8; white-space: pre-line; }

  .notice { font-size: 11px; color: var(--muted); margin-top: 16px; line-height: 1.7; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← 계산기 목록으로</a>
  <h1>💰 <span>퇴직금</span> 계산기</h1>
  <p class="sub">두 가지 방법으로 예상 퇴직금을 계산할 수 있어요</p>

  <div class="tab-wrap">
    <button class="tab-btn active" onclick="switchTab('date')">📅 입사일·퇴사일로<br>계산하기</button>
    <button class="tab-btn" onclick="switchTab('simple')">💵 월급여·근속개월로<br>계산하기</button>
  </div>

  <div class="panel active" id="panel-date">
    <div class="card">
      <label>월급여 (세전, 원)</label>
      <input type="number" id="salary1" placeholder="예: 3500000" oninput="calcDate()">
    </div>
    <div class="card">
      <div class="row2">
        <div class="ig"><label>입사일</label><input type="date" id="startDate" oninput="calcDate()"></div>
        <div class="ig"><label>퇴사일</label><input type="date" id="endDate" oninput="calcDate()"></div>
      </div>
    </div>
    <div class="result-box">
      <div class="result-label">예상 퇴직금</div>
      <div class="result-amount" id="result-date">— 원</div>
      <div class="result-detail" id="detail-date">입사일과 퇴사일을 입력하세요</div>
    </div>
  </div>

  <div class="panel" id="panel-simple">
    <div class="card">
      <label>월급여 (세전, 원)</label>
      <input type="number" id="salary2" placeholder="예: 3500000" oninput="calcSimple()">
    </div>
    <div class="card">
      <label>근속 개월 수</label>
      <input type="number" id="months" placeholder="예: 36 (3년 = 36개월)" oninput="calcSimple()">
    </div>
    <div class="result-box">
      <div class="result-label">예상 퇴직금</div>
      <div class="result-amount" id="result-simple">— 원</div>
      <div class="result-detail" id="detail-simple">월급여와 근속 개월 수를 입력하세요</div>
    </div>
  </div>

  <p class="notice">※ 간편 계산용으로 실제 퇴직금과 차이가 있을 수 있습니다.<br>정확한 금액은 고용노동부 퇴직금 계산기를 이용하세요.</p>
</div>
<script>
function fmt(n) { return Math.round(n).toLocaleString('ko-KR') + ' 원'; }
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (t==='date'&&i===0)||(t==='simple'&&i===1)));
  document.getElementById('panel-date').classList.toggle('active', t==='date');
  document.getElementById('panel-simple').classList.toggle('active', t==='simple');
}
function calcDate() {
  const salary = parseFloat(document.getElementById('salary1').value)||0;
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  if (!salary||!start||!end) { document.getElementById('result-date').textContent='— 원'; document.getElementById('detail-date').textContent='모든 항목을 입력하세요'; return; }
  const diff = new Date(end) - new Date(start);
  if (diff<=0) { document.getElementById('result-date').textContent='— 원'; document.getElementById('detail-date').textContent='퇴사일이 입사일보다 빠릅니다'; return; }
  const days = diff/(1000*60*60*24);
  const years = days/365;
  if (years<1) { document.getElementById('result-date').textContent='0 원'; document.getElementById('detail-date').textContent=`근속기간 ${Math.floor(days)}일\n1년 미만은 퇴직금이 발생하지 않습니다`; return; }
  const pay = salary * years;
  const y = Math.floor(years), m = Math.floor((years-y)*12);
  document.getElementById('result-date').textContent = fmt(pay);
  document.getElementById('detail-date').textContent = `근속기간 ${y}년 ${m}개월 (${Math.floor(days)}일)\n월급여 ${salary.toLocaleString('ko-KR')}원 × ${years.toFixed(2)}년`;
}
function calcSimple() {
  const salary = parseFloat(document.getElementById('salary2').value)||0;
  const months = parseFloat(document.getElementById('months').value)||0;
  if (!salary||!months) { document.getElementById('result-simple').textContent='— 원'; document.getElementById('detail-simple').textContent='월급여와 근속 개월 수를 입력하세요'; return; }
  if (months<12) { document.getElementById('result-simple').textContent='0 원'; document.getElementById('detail-simple').textContent='근속 12개월 미만은 퇴직금이 발생하지 않습니다'; return; }
  const years = months/12;
  document.getElementById('result-simple').textContent = fmt(salary*years);
  document.getElementById('detail-simple').textContent = `월급여 ${salary.toLocaleString('ko-KR')}원 × ${years.toFixed(2)}년 (${months}개월)`;
}
</script>
</body>
</html>
