*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0d14;--card:#131720;--card2:#1a1d27;--bd:#252a3a;--text:#f0f2ff;--muted:#6a748a;--dim:#3a4058;--blue:#4f8ef7;--green:#34d399;--red:#ef4444;--amber:#f59e0b;--yellow:#facc15}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{padding:12px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;font-size:12px;background:var(--card)}

/* HUD */
.hud{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:10px 8px;margin-bottom:6px}
.hi{text-align:center;padding:0 4px}
.hl{font-size:9px;color:var(--dim);margin-bottom:3px;letter-spacing:.5px;text-transform:uppercase}

.timer-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--amber));border-radius:2px;transition:width .3s linear}

/* 가격 */

.pnum{font-size:42px;font-weight:900;letter-spacing:-1px;transition:color .15s}
.pchg{font-size:14px;font-weight:700;margin-top:2px;transition:color .15s}

/* 차트 */
#cv{width:100%;border-radius:8px;display:block;margin-bottom:8px;background:#060810}

/* 토스트 */
.toast-area{min-height:0}
.toast{border-radius:8px;padding:9px 14px;margin-bottom:5px;font-size:13px;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* 활성 포지션 */
.pos-section{margin-bottom:8px}
.pos-head{font-size:10px;color:var(--dim);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.pos-empty{font-size:11px;color:var(--dim);text-align:center;padding:6px;background:var(--card);border-radius:7px}
.pos-card{background:var(--card);border:1px solid var(--bd);border-radius:9px;padding:9px 11px;margin-bottom:5px}
.pos-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:12px}
.pos-bar-bg{height:3px;background:#0d1020;border-radius:2px;overflow:hidden;margin-bottom:4px}
.pos-bar{height:100%;border-radius:2px;transition:width .3s linear}
.pos-entry{font-size:10px;color:var(--dim)}

/* 주문 패널 */
.order-panel{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px}
.amt-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.amt-input{flex:1;padding:10px 12px;background:#0d1020;border:1px solid var(--bd);border-radius:8px;color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:border-color .2s;-moz-appearance:textfield}
.amt-input::-webkit-outer-spin-button,.amt-input::-webkit-inner-spin-button{-webkit-appearance:none}
.amt-input:focus{border-color:var(--blue)}
.amt-unit{font-size:13px;color:var(--muted);white-space:nowrap}
.prerow{display:flex;gap:5px;margin-bottom:10px}
.abtn,.tbtn{flex:1;padding:6px 4px;background:#0d1020;border:1px solid var(--bd);border-radius:6px;color:var(--muted);font-size:11px;font-family:inherit;cursor:pointer;transition:all .2s;text-align:center}
.abtn.active,.tbtn.active{border-color:var(--blue);color:var(--blue);background:#0f1a2a;font-weight:700}
.abtn:hover:not(.active),.tbtn:hover:not(.active){border-color:var(--muted);color:var(--text)}
.time-row{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.time-lbl{font-size:11px;color:var(--muted);white-space:nowrap}
.payout-info{font-size:11px;color:var(--dim);text-align:center;margin-bottom:10px}
/* 예측 버튼 */
.predict-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pbtn{padding:16px 8px;border:none;border-radius:12px;font-size:16px;font-weight:900;font-family:inherit;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.pbtn:active{transform:scale(.96)}
.up-btn{background:linear-gradient(135deg,#059669,#10b981);color:#fff;box-shadow:0 4px 15px rgba(5,150,105,.3)}
.up-btn:hover{background:linear-gradient(135deg,#047857,#059669);box-shadow:0 4px 20px rgba(5,150,105,.5)}
.down-btn{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 4px 15px rgba(220,38,38,.3)}
.down-btn:hover{background:linear-gradient(135deg,#b91c1c,#dc2626);box-shadow:0 4px 20px rgba(220,38,38,.5)}

/* 시작/결과 */
.start-box,.end-box{text-align:center;padding:20px 0 10px}
.s-icon,.e-icon{font-size:52px;margin-bottom:10px}
.s-title,.e-title{font-size:22px;font-weight:900;margin-bottom:8px}
.s-desc{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:16px}
.rules-box{background:var(--card);border:1px solid var(--bd);border-radius:11px;padding:14px;margin-bottom:16px;text-align:left}
.rules-box li{list-style:none;font-size:12px;color:var(--muted);line-height:2.3}
.rules-box li strong{color:var(--text)}

.stat-row{display:flex;justify-content:center;gap:20px;margin-bottom:18px}
.stat{text-align:center}

.big-btn{width:100%;padding:14px;background:var(--blue);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px;transition:opacity .2s}
.big-btn:hover{opacity:.88}.big-btn.sec{background:var(--card);border:1px solid var(--bd);color:var(--muted)}

<script>
/* ════════════════════════════════════════
   상승 / 하락 예측 게임 (Olymp Trade 스타일)
   ════════════════════════════════════════ */

const INIT_BAL  = 10000000;   // 시작 잔고
const PAYOUT    = 0.85;        // 승리 수익률 (85%)
const GAME_SEC  = 300;         // 5분
const TICK_MS   = 300;         // 가격 업데이트 간격
const MAX_POS   = 3;           // 최대 동시 예측
const PRED_TIMES = [30]; // 예측 시간(초)

const NEWS = [
  '📰 분기 실적 발표 예정','⚡ 외국인 순매수 급증','📉 금리 인상 우려',
  '🔥 공매도 세력 청산','📊 기관 대량 매집','⚠️ 글로벌 증시 불안',
  '💡 신제품 발표','🏦 연준 금리 동결','🌐 원달러 환율 급등',
];

// ── 상태 ──
let phase    = 'start';
let balance  = INIT_BAL;
let positions = [];    // 활성 예측
let allResults= [];    // 전체 결과 기록
let price    = 50000;
let prevPrice= 50000;
let prices   = [50000];
let trend    = 0, vol  = 0.01;
let tick     = 0;
let gameInt  = null;
let newsMsg  = '';

// UI 선택
let selTime = 30;
let selAmtW = 100;  // 만원

// ── 헬퍼 ──
function portBal()  { return balance + positions.reduce((s,p)=>s+p.amount, 0); }
function totalRet() { return (balance - INIT_BAL) / INIT_BAL * 100; }
function gameSecs() { return Math.max(0, GAME_SEC - Math.floor(tick * TICK_MS / 1000)); }
function toTicks(s) { return Math.round(s * 1000 / TICK_MS); }
function fm(n) {
  const a = Math.abs(Math.floor(n));
  if(a>=100000000) return (a/100000000).toFixed(1)+'억';
  if(a>=10000) return Math.round(a/10000)+'만';
  return a.toLocaleString();
}
function el(id) { return document.getElementById(id); }
function rndTrend() { return (Math.random()-0.47)*0.0036; }
function rndVol()   { return 0.007+Math.random()*0.013; }
function nextPr(p,t,v){ return Math.max(500, p+p*(t+v*(Math.random()*2-1))); }

// ── 게임 시작 ──
function startGame() {
  clearInterval(gameInt);
  phase='playing'; balance=INIT_BAL;
  positions=[]; allResults=[];
  price=50000; prevPrice=50000; prices=[50000];
  trend=rndTrend(); vol=rndVol();
  tick=0; newsMsg='📢 예측을 시작하세요!';
  selTime=30; selAmtW=100;
  renderAll();
  gameInt = setInterval(gameTick, TICK_MS);
}

// ── 틱 ──
function gameTick() {
  prevPrice = price;
  price = nextPr(price, trend, vol);
  prices.push(price);
  tick++;
  if(Math.random()<0.025) trend=rndTrend();
  if(Math.random()<0.035) newsMsg=NEWS[Math.floor(Math.random()*NEWS.length)];
  checkExpired();
  if(gameSecs()<=0){ endGame(); return; }
  updateUI();
}

// ── 만료 체크 ──
function checkExpired() {
  const expired = positions.filter(p=>tick>=p.expireTick);
  positions = positions.filter(p=>tick<p.expireTick);
  expired.forEach(pos=>{
    const won=(pos.dir==='up'&&price>pos.entryPrice)||(pos.dir==='down'&&price<pos.entryPrice);
    const profit = won ? Math.round(pos.amount*PAYOUT) : -pos.amount;
    if(won) balance += pos.amount + Math.round(pos.amount*PAYOUT);
    allResults.unshift({...pos, won, profit, exitPrice:price});
    if(allResults.length>20) allResults.pop();
    showToast(won, profit, pos.dir);
  });
}

// ── 토스트 ──
function showToast(won, profit, dir) {
  const area = el('toast-area');
  if(!area) return;
  const d = document.createElement('div');
  const dc = dir==='up'?'var(--green)':'var(--red)';
  const pc = won?'var(--green)':'var(--red)';
  const bg = won?'rgba(52,211,153,.08)':'rgba(239,68,68,.08)';
  const bd = won?'rgba(52,211,153,.3)':'rgba(239,68,68,.3)';
  d.className='toast';
  d.style.cssText=`background:${bg};border:1px solid ${bd};`;
  d.innerHTML=`<span style="color:${dc};font-weight:700">${dir==='up'?'▲ 상승':'▼ 하락'} 예측</span>
    <span style="color:${won?'var(--green)':'var(--red)'};font-weight:700;margin-left:6px">${won?'✅ 성공!':'❌ 실패'}</span>
    <span style="float:right;font-weight:700;color:${pc}">${profit>0?'+':''}${fm(profit)}원</span>`;
  area.insertBefore(d, area.firstChild);
  setTimeout(()=>{d.style.transition='opacity .5s';d.style.opacity='0';setTimeout(()=>d.remove(),500);},4000);
}

// ── 예측 ──
function predict(dir) {
  if(phase!=='playing') return;
  if(positions.length>=MAX_POS){ showNotice('동시에 최대 '+MAX_POS+'개까지 예측 가능합니다'); return; }
  const amount = Math.round(selAmtW)*10000;
  if(amount<=0){ showNotice('금액을 입력하세요'); return; }
  if(amount>balance){ showNotice('잔고가 부족합니다'); return; }
  balance -= amount;
  positions.push({
    id:Date.now(), dir, amount,
    entryPrice:price,
    expireTick:tick+toTicks(selTime),
    selTime,
  });
  updateUI();
}

function showNotice(msg) {
  const area=el('toast-area'); if(!area) return;
  const d=document.createElement('div');
  d.className='toast';
  d.style.cssText='background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);';
  d.innerHTML=`<span style="color:var(--amber)">${msg}</span>`;
  area.insertBefore(d,area.firstChild);
  setTimeout(()=>{d.style.transition='opacity .5s';d.style.opacity='0';setTimeout(()=>d.remove(),500);},2500);
}

// ── UI 업데이트 ──
function updateUI() {
  const up  = price>=prevPrice;
  const chgP= prevPrice?(price-prevPrice)/prevPrice*100:0;
  const lc  = up?'var(--green)':'var(--red)';
  const tr  = totalRet(), rc=tr>=0?'var(--green)':'var(--red)';
  const secs= gameSecs();
  const mm  = String(Math.floor(secs/60)).padStart(2,'0');
  const ss  = String(secs%60).padStart(2,'0');
  const prog= (1-secs/GAME_SEC)*100;

  const set=(id,v)=>{const e=el(id);if(e)e.textContent=v;};
  const sty=(id,p,v)=>{const e=el(id);if(e)e.style[p]=v;};

  set('pnum',Math.round(price).toLocaleString()+'원'); sty('pnum','color',lc);
  set('pchg',(up?'▲':'▼')+' '+Math.abs(chgP).toFixed(2)+'%'); sty('pchg','color',lc);
  set('hv-bal',fm(balance)+'원');
  set('hv-ret',(tr>=0?'+':'')+tr.toFixed(1)+'%'); sty('hv-ret','color',rc);
  set('hv-time',mm+':'+ss);
  sty('timer-bar','width',prog+'%');
  set('news-txt',newsMsg);
  set('entry-price-display', Math.round(price).toLocaleString()+'원');

  updatePosUI();
  requestAnimationFrame(drawChart);
}

// ── 포지션 UI ──
function updatePosUI() {
  const cont=el('pos-list'); if(!cont) return;
  if(positions.length===0){
    cont.innerHTML='<div class="pos-empty">예측 없음 — 아래에서 상승/하락을 예측하세요</div>';
    return;
  }
  cont.innerHTML=positions.map(pos=>{
    const remT=pos.expireTick-tick;
    const remS=Math.max(0,Math.ceil(remT*TICK_MS/1000));
    const pct=Math.min(100,(1-remS/pos.selTime)*100);
    const winning=(pos.dir==='up'&&price>pos.entryPrice)||(pos.dir==='down'&&price<pos.entryPrice);
    const dc=pos.dir==='up'?'var(--green)':'var(--red)';
    const wc=winning?'var(--green)':'var(--red)';
    const pdiff=((price-pos.entryPrice)/pos.entryPrice*100);
    const profit=winning?Math.round(pos.amount*PAYOUT):-pos.amount;
    return `<div class="pos-card">
      <div class="pos-top">
        <span style="color:${dc};font-weight:700;font-size:13px">${pos.dir==='up'?'▲ 상승':'▼ 하락'}</span>
        <span style="color:var(--muted);font-size:12px">${fm(pos.amount)}원</span>
        <span style="color:${wc};font-weight:600;font-size:12px">${profit>0?'+':''}${fm(profit)}원 예상</span>
        <span style="color:var(--yellow);font-weight:700;font-size:13px">${remS}초</span>
      </div>
      <div class="pos-bar-bg"><div class="pos-bar" style="width:${pct}%;background:${dc}60"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
        <div>
          <div style="font-size:9px;color:var(--dim);margin-bottom:1px">진입가격</div>
          <div style="font-size:14px;font-weight:700;color:var(--text)">${Math.round(pos.entryPrice).toLocaleString()}원</div>
        </div>
        <div style="color:var(--dim);font-size:12px">→</div>
        <div style="text-align:right">
          <div style="font-size:9px;color:var(--dim);margin-bottom:1px">현재가격</div>
          <div style="font-size:14px;font-weight:700;color:${wc}">${Math.round(price).toLocaleString()}원</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:9px;color:var(--dim);margin-bottom:1px">변동</div>
          <div style="font-size:13px;font-weight:700;color:${wc}">${pdiff>=0?'+':''}${pdiff.toFixed(2)}%</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── 차트 ──
function drawChart() {
  const cv=el('cv'); if(!cv) return;
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  ctx.fillStyle='#060810'; ctx.fillRect(0,0,W,H);
  const vis=prices.slice(-90); if(vis.length<2) return;
  const lo=Math.min(...vis),hi=Math.max(...vis);
  const rng=hi-lo||1,pad=rng*0.15;
  const py=p=>H-((p-lo+pad)/(rng+pad*2))*H*0.88-H*0.06;
  const up2=price>=(prices.length>=2?prices[prices.length-2]:price);
  const lc=up2?'#34d399':'#ef4444';
  // 그리드
  ctx.strokeStyle='#111520';ctx.lineWidth=1;
  for(let i=1;i<4;i++){const y=H*i/4;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // 포지션 진입가 라인들
  positions.forEach(pos=>{
    const ay=py(pos.entryPrice);
    if(ay>=0&&ay<=H){
      ctx.strokeStyle=pos.dir==='up'?'rgba(52,211,153,.45)':'rgba(239,68,68,.45)';
      ctx.lineWidth=1.2;ctx.setLineDash([5,5]);
      ctx.beginPath();ctx.moveTo(0,ay);ctx.lineTo(W,ay);ctx.stroke();
      ctx.setLineDash([]);
    }
  });
  // 면 채우기
  ctx.beginPath();
  vis.forEach((p,i)=>{const x=i/(vis.length-1)*W;i===0?ctx.moveTo(x,py(p)):ctx.lineTo(x,py(p));});
  const ly=py(vis[vis.length-1]);
  ctx.lineTo(W,ly);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  ctx.fillStyle=up2?'rgba(52,211,153,.1)':'rgba(239,68,68,.1)';ctx.fill();
  // 메인 라인
  ctx.beginPath();
  vis.forEach((p,i)=>{const x=i/(vis.length-1)*W;i===0?ctx.moveTo(x,py(p)):ctx.lineTo(x,py(p));});
  ctx.strokeStyle=lc;ctx.lineWidth=2.3;ctx.stroke();
  // 현재가 점선
  ctx.setLineDash([4,5]);ctx.strokeStyle=lc+'55';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();ctx.setLineDash([]);
}

// ── 게임 종료 ──
function endGame() {
  clearInterval(gameInt);
  // 남은 포지션 강제 체결
  positions.forEach(pos=>{
    const won=(pos.dir==='up'&&price>pos.entryPrice)||(pos.dir==='down'&&price<pos.entryPrice);
    if(won) balance+=pos.amount+Math.round(pos.amount*PAYOUT);
    allResults.unshift({...pos,won,profit:won?Math.round(pos.amount*PAYOUT):-pos.amount,exitPrice:price});
  });
  positions=[];
  phase='ended';
  renderEnd();
}

// ── 등급 ──
function getRating(p){
  if(p<-40)return{em:'😵',lbl:'전재산 날림... 다시 도전!',cl:'var(--red)'};
  if(p<-15)return{em:'😢',lbl:'투자 실패, 다음엔 더 잘할 수 있어요',cl:'var(--red)'};
  if(p< 0) return{em:'😅',lbl:'거의 본전... 살짝 아쉬워요',cl:'var(--amber)'};
  if(p<20) return{em:'👍',lbl:'나쁘지 않은 예측이에요!',cl:'var(--green)'};
  if(p<50) return{em:'🎯',lbl:'예측의 달인!',cl:'var(--green)'};
  if(p<100)return{em:'🏆',lbl:'올림프 트레이드 고수!',cl:'var(--blue)'};
  return        {em:'🔥',lbl:'예언자 강림!!!',cl:'var(--yellow)'};
}

// ── 탭/선택 ──
function setTime(sec){
  selTime=sec;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.sec)===sec));
}
function setAmt(wan){
  selAmtW=wan;
  const inp=el('amt-input');if(inp)inp.value=wan;
  document.querySelectorAll('.abtn').forEach(b=>b.classList.toggle('active',parseFloat(b.dataset.w)===wan));
}
function onAmtChange(v){ selAmtW=parseFloat(v)||0; document.querySelectorAll('.abtn').forEach(b=>b.classList.remove('active')); }

// ── 전체 렌더 ──
function renderAll(){
  const tr=totalRet(),rc=tr>=0?'var(--green)':'var(--red)';
  const secs=gameSecs();
  const mm=String(Math.floor(secs/60)).padStart(2,'0');
  const ss2=String(secs%60).padStart(2,'0');
  el('root').innerHTML=`
<div class="hud">
  <div class="hi"><div class="hl">잔 고</div><div class="hv" id="hv-bal">${fm(balance)}원</div></div>
  <div class="hi"><div class="hl">수익률</div><div class="hv" id="hv-ret" style="color:${rc}">${tr>=0?'+':''}${tr.toFixed(1)}%</div></div>
  <div class="hi"><div class="hl">남은시간</div><div class="hv" id="hv-time">${mm}:${ss2}</div></div>
</div>
<div class="timer-wrap"><div class="timer-bar" id="timer-bar" style="width:${(1-secs/GAME_SEC)*100}%"></div></div>

<div class="pbox">
  <div class="pnum" id="pnum">${Math.round(price).toLocaleString()}원</div>
  <div class="pchg" id="pchg" style="color:var(--muted)">—</div>
</div>
<canvas id="cv" width="480" height="155"></canvas>
<div style="font-size:10px;color:var(--dim);text-align:center;margin-bottom:6px;min-height:16px" id="news-txt">${newsMsg}</div>

<div id="toast-area" class="toast-area"></div>

<div class="pos-section">
  <div class="pos-head">활성 예측 (${positions.length}/${MAX_POS})</div>
  <div id="pos-list"></div>
</div>

<div class="order-panel">
  <div class="amt-row">
    <input class="amt-input" id="amt-input" type="number" value="${selAmtW}" min="1" placeholder="투자 금액" oninput="onAmtChange(this.value)">
    <span class="amt-unit">만원</span>
  </div>
  <div class="prerow">
    <button class="abtn${selAmtW===50?' active':''}" data-w="50" onclick="setAmt(50)">50만</button>
    <button class="abtn${selAmtW===100?' active':''}" data-w="100" onclick="setAmt(100)">100만</button>
    <button class="abtn${selAmtW===200?' active':''}" data-w="200" onclick="setAmt(200)">200만</button>
    <button class="abtn" data-w="-1" onclick="(function(){const w=Math.floor(balance/10000);setAmt(w);})()">전액</button>
  </div>
  <div class="payout-info">✅ 예측 성공 시 투자금 × <strong style="color:var(--green)">185%</strong> 수령 &nbsp;|&nbsp; ❌ 실패 시 투자금 전액 손실</div>
  <div style="background:#0d1020;border:1px solid var(--bd);border-radius:8px;padding:8px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:11px;color:var(--dim)">📌 예측 시작 기준 가격</span>
    <span style="font-size:16px;font-weight:700;color:var(--text)" id="entry-price-display">${Math.round(price).toLocaleString()}원</span>
  </div>
  <div class="predict-btns">
    <button class="pbtn up-btn" onclick="predict('up')">▲ 상 승</button>
    <button class="pbtn down-btn" onclick="predict('down')">▼ 하 락</button>
  </div>
</div>`;
  updatePosUI();
  requestAnimationFrame(drawChart);
}

function renderStart(){
  el('root').innerHTML=`
<div class="start-box">
  <div class="s-icon">📊</div>
  <div class="s-title">상승 / 하락 예측 게임</div>
  <p class="s-desc">Olymp Trade 방식! 가격이 오를지 내릴지 예측하고<br>수익을 극대화하세요</p>
  <div class="rules-box">
    <ul>
      <li>💰 시작 잔고 <strong>1,000만원</strong></li>
      <li>⏱️ 예측 시간: <strong>30초 고정</strong></li>
      <li>▲ <strong>상승</strong> 또는 ▼ <strong>하락</strong> 버튼 클릭</li>
      <li>✅ 예측 성공 → 투자금 × <strong>185%</strong> 수령</li>
      <li>❌ 예측 실패 → 투자금 전액 손실</li>
      <li>📊 최대 <strong>3개</strong> 동시 예측 가능</li>
      <li>⌛ 총 게임시간 <strong>5분</strong></li>
    </ul>
  </div>
  <button class="big-btn" onclick="startGame()">게임 시작 🚀</button>
</div>`;
}

function renderEnd(){
  const tr=totalRet(),rc=tr>=0?'var(--green)':'var(--red)';
  const r=getRating(tr);
  const wins=allResults.filter(r=>r.won).length;
  const loses=allResults.filter(r=>!r.won).length;
  const total=wins+loses;
  el('root').innerHTML=`
<div class="end-box">
  <div class="e-icon">${r.em}</div>
  <div class="e-title" style="color:${r.cl}">${r.lbl}</div>
  <div class="e-ret" style="color:${rc}">${tr>=0?'+':''}${tr.toFixed(1)}%</div>
  <div class="e-bal">최종 잔고 <strong style="color:var(--text)">${fm(balance)}원</strong>
    (${tr>=0?'+':''}${fm(balance-INIT_BAL)}원)</div>
  <div class="stat-row">
    <div class="stat"><div class="stat-v" style="color:var(--green)">${wins}</div><div class="stat-l">✅ 성공</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--red)">${loses}</div><div class="stat-l">❌ 실패</div></div>
    <div class="stat"><div class="stat-v">${total>0?Math.round(wins/total*100):0}%</div><div class="stat-l">승 률</div></div>
  </div>
  <button class="big-btn" onclick="startGame()">🔄 다시 도전</button>
  <button class="big-btn sec" onclick="location.href='/calculator-hub/'">← 계산기 허브로</button>
</div>`;
}

renderStart();
</script>
</body>
</html>
