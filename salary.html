<!DOCTYPE html>
<html lang="ko">
<head>

<script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연봉 실수령액 계산기 | 세후 월급 계산</title>
<meta name="description" content="세전 연봉 입력 시 4대보험, 소득세, 지방소득세 공제 후 실수령액을 계산합니다.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2e3347;
    --accent: #4f8ef7; --text: #f0f2ff; --muted: #8892aa;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 30px 16px 60px; }

  .back { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; text-decoration: none; margin-bottom: 24px; transition: color 0.2s; }
  .back:hover { color: var(--accent); }

  .wrap { max-width: 500px; margin: 0 auto; }

  h1 { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
  h1 span { color: var(--accent); }
  .sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-bottom: 16px; }

  label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }

  input[type=number], input[type=range] { width: 100%; }
  input[type=number] {
    background: #0f1117; border: 1.5px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 20px; font-weight: 700; padding: 12px 16px;
    font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color 0.2s;
  }
  input[type=number]:focus { border-color: var(--accent); }

  input[type=range] {
    -webkit-appearance: none; height: 4px; border-radius: 99px;
    background: var(--border); margin-top: 10px; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
  }

  .range-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* 결과 */
  .result-main { background: linear-gradient(135deg, #1a2a4a, #1a1d27); border: 1px solid rgba(79,142,247,0.3); border-radius: 18px; padding: 28px 24px; margin-bottom: 16px; text-align: center; }
  .result-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .result-amount { font-size: 40px; font-weight: 900; color: var(--accent); letter-spacing: -1px; }
  .result-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .breakdown { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px 24px; }
  .breakdown h3 { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 14px; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .row:last-child { border-bottom: none; }
  .row .label { color: var(--muted); }
  .row .val { font-weight: 700; }
  .row.total { margin-top: 4px; }
  .row.total .label { color: var(--text); font-weight: 700; }
  .row.total .val { color: var(--accent); font-size: 16px; }
  .minus { color: #f87171; }

  .notice { font-size: 11px; color: var(--muted); margin-top: 16px; line-height: 1.7; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← 계산기 목록으로</a>
  <h1>💵 연봉 <span>실수령액</span> 계산기</h1>
  <p class="sub">세전 연봉을 입력하면 4대보험·소득세 공제 후<br>실제 월 수령액을 계산합니다 (2024년 기준)</p>

  <div class="card">
    <label>세전 연봉 (원)</label>
    <input type="number" id="salary" placeholder="예: 40000000" oninput="calc()">
    <input type="range" id="slider" min="20000000" max="200000000" step="1000000" value="40000000" oninput="syncSlider(this.value)">
    <div class="range-labels"><span>2,000만</span><span>1억</span><span>2억</span></div>
  </div>

  <div class="result-main">
    <div class="result-label">월 실수령액 (예상)</div>
    <div class="result-amount" id="take-home">— 원</div>
    <div class="result-sub" id="annual-take"></div>
  </div>

  <div class="breakdown">
    <h3>공제 항목 상세</h3>
    <div class="row"><span class="label">세전 월급</span><span class="val" id="b-gross">—</span></div>
    <div class="row"><span class="label minus">국민연금 (4.5%)</span><span class="val minus" id="b-pension">—</span></div>
    <div class="row"><span class="label minus">건강보험 (3.545%)</span><span class="val minus" id="b-health">—</span></div>
    <div class="row"><span class="label minus">장기요양보험 (건강보험의 12.95%)</span><span class="val minus" id="b-care">—</span></div>
    <div class="row"><span class="label minus">고용보험 (0.9%)</span><span class="val minus" id="b-employ">—</span></div>
    <div class="row"><span class="label minus">소득세 (간이세액)</span><span class="val minus" id="b-income">—</span></div>
    <div class="row"><span class="label minus">지방소득세 (소득세의 10%)</span><span class="val minus" id="b-local">—</span></div>
    <div class="row total"><span class="label">월 실수령액</span><span class="val" id="b-total">—</span></div>
  </div>

  <p class="notice">※ 부양가족 수, 비과세 항목 등에 따라 실제 금액과 차이가 있을 수 있습니다.<br>정확한 계산은 국세청 홈택스를 이용하세요.</p>
</div>

<script>
function fmt(n) { return Math.round(n).toLocaleString('ko-KR') + ' 원'; }

function syncSlider(v) {
  document.getElementById('salary').value = v;
  calc();
}

function calc() {
  const annual = parseFloat(document.getElementById('salary').value) || 0;
  document.getElementById('slider').value = Math.min(Math.max(annual, 20000000), 200000000);

  if (!annual) {
    ['take-home','annual-take','b-gross','b-pension','b-health','b-care','b-employ','b-income','b-local','b-total'].forEach(id => {
      document.getElementById(id).textContent = '—';
    });
    return;
  }

  const monthly = annual / 12;

  // 4대보험
  const pension = Math.min(monthly, 5900000) * 0.045; // 국민연금 상한 590만
  const health = monthly * 0.03545;
  const care = health * 0.1295;
  const employ = monthly * 0.009;

  // 소득세 (간이세액표 근사치)
  let incomeTax = 0;
  if (annual <= 12000000) incomeTax = annual * 0.06 / 12;
  else if (annual <= 46000000) incomeTax = (720000 + (annual - 12000000) * 0.15) / 12;
  else if (annual <= 88000000) incomeTax = (5820000 + (annual - 46000000) * 0.24) / 12;
  else if (annual <= 150000000) incomeTax = (15900000 + (annual - 88000000) * 0.35) / 12;
  else incomeTax = (37600000 + (annual - 150000000) * 0.38) / 12;

  // 근로소득공제 반영 (간이)
  incomeTax = Math.max(incomeTax * 0.55, 0);

  const local = incomeTax * 0.1;
  const totalDeduct = pension + health + care + employ + incomeTax + local;
  const takeHome = monthly - totalDeduct;

  document.getElementById('take-home').textContent = fmt(takeHome);
  document.getElementById('annual-take').textContent = `연간 실수령액 약 ${fmt(takeHome * 12)}`;
  document.getElementById('b-gross').textContent = fmt(monthly);
  document.getElementById('b-pension').textContent = '- ' + fmt(pension);
  document.getElementById('b-health').textContent = '- ' + fmt(health);
  document.getElementById('b-care').textContent = '- ' + fmt(care);
  document.getElementById('b-employ').textContent = '- ' + fmt(employ);
  document.getElementById('b-income').textContent = '- ' + fmt(incomeTax);
  document.getElementById('b-local').textContent = '- ' + fmt(local);
  document.getElementById('b-total').textContent = fmt(takeHome);
}
</script>
</body>
</html>
